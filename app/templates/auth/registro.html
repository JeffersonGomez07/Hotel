<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hotel Paraíso - Registro</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/registro.css') }}" />
</head>
<body>
  <header>
    <h1>Hotel Paraíso</h1>
          <nav>
  <div class="nav-izquierda">
    <a href="{{ url_for('public.index') }}">Inicio</a>
    <a href="{{ url_for('public.habitaciones') }}">Habitaciones</a>
    <a href="{{ url_for('reservacion.reservaciones') }}">Reservaciones</a>
    <a href="{{ url_for('public.servicios') }}">Servicios</a>
    <a href="{{ url_for('public.contacto') }}">Contacto</a>
    <a href="{{ url_for('public.nosotros') }}">Nosotros</a>
  </div>
</nav>
  </header>

  <main>
    <div class="registro-container">
      <h2>Crear una cuenta</h2>
      <form method="POST" action="{{ url_for('auth.registro') }}">
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" required />
        </div>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required />
        </div>
        <div class="form-group">
          <label for="confirmar">Confirmar contraseña</label>
          <input type="password" id="confirmar" name="confirmar" required />
        </div>
        <button type="submit" class="registro-btn">Registrarse</button>
      </form>
      <div class="registro-footer">
        <p>¿Ya tienes una cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión aquí</a></p>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2025 Hotel Paraíso. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
